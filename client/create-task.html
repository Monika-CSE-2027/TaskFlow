<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Task - TaskFlow</title>

<link rel="stylesheet" href="css/style.css">

<!-- Optional: small extra styling safety -->
<style>
/* Toast UI */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);

    background: #2563eb; /* blue */
    color: white;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s ease;
    z-index: 9999;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* optional */
.toast.success {
    background: #161fa3;
}

.toast.error {
    background: #2626dc;
}
/* basic form styling improvement */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

textarea {
    min-height: 100px;
    resize: none;
}
</style>

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            TaskFlow
        </div>

        <a href="dashboard.html">Dashboard</a>
        <a href="tasks.html">Tasks</a>
        <a href="create-task.html">Create Task</a>
        <a href="analytics.html">Analytics</a>
        <a href="profile.html">Profile</a>

        <button class="btn logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="welcome-card">
            <h1>Create New Task</h1>
            <p>Add and manage your work efficiently.</p>
        </div>

        <div class="section">

            <div class="form-group">
                <label>Task Title</label>
                <input type="text" id="title" placeholder="Enter task title">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Enter task description"></textarea>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <button class="btn" onclick="createTask()">
                Create Task
            </button>

        </div>

    </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="js/create-task.js"></script>

</body>
</html>
