<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Analytics - TaskFlow</title>

<link rel="stylesheet"
href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            TaskFlow
        </div>

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="tasks.html">
            Tasks
        </a>

        <a href="create-task.html">
            Create Task
        </a>

        <a href="analytics.html">
            Analytics
        </a>

        <a href="profile.html">
            Profile
        </a>

        <button
        class="btn logout-btn"
        onclick="logout()">

        Logout

        </button>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="welcome-card">

            <h1>
                Analytics Overview
            </h1>

            <p>
                Monitor productivity and task progress
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>

            <div class="card">
                <h3>In Progress</h3>
                <p id="progressTasks">0</p>
            </div>

        </div>

        <div class="section">

            <h2>
                Completion Rate
            </h2>

            <br>

            <div
            style="
            width:100%;
            height:20px;
            background:#0B1220;
            border-radius:10px;
            overflow:hidden;
            ">

                <div
                id="progressBar"
                style="
                height:100%;
                width:0%;
                background:#2563EB;
                transition:1s;
                ">
                </div>

            </div>

            <br>

            <h2
            id="completionRate">
            0%
            </h2>

        </div>

        <div class="section">

            <h2>
                Productivity Score
            </h2>

            <br>

            <h1
            id="productivityScore">

            0

            </h1>

        </div>

    </div>

</div>

<script src="js/analytics.js"></script>

</body>
</html>
