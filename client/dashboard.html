<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            TaskFlow
        </div>

        <a href="dashboard.html">Dashboard</a>

        <a href="tasks.html">Tasks</a>

        <a href="create-task.html">Create Task</a>

        <a href="analytics.html">Analytics</a>

        <a href="profile.html">Profile</a>

        <button class="btn logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="welcome-card">

            <h1>Dashboard</h1>

            <br>

            <p id="todayDate"></p>

            <br>

            <p>
                Manage your tasks efficiently and track your productivity.
            </p>

        </div>

        <!-- Statistics Cards -->

        <div class="cards">

            <div class="card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h3>Pending Tasks</h3>
                <p id="pendingTasks">0</p>
            </div>

            <div class="card">
                <h3>In Progress</h3>
                <p id="progressTasks">0</p>
            </div>

            <div class="card">
                <h3>Completed Tasks</h3>
                <p id="completedTasks">0</p>
            </div>

        </div>

        <!-- Recent Tasks -->

        <div class="section">

            <h2>Recent Tasks</h2>

            <table>

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="recentTasks">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
